<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Style 1: Rich dark soil with scattered pebbles -->
  <rect width="100" height="100" fill="#5C3D2E"/>
  <rect width="100" height="100" fill="#4A3222" opacity="0.4"/>
  <!-- Soil texture dots -->
  <circle cx="10" cy="15" r="2.5" fill="#3E2A1C" opacity="0.6"/>
  <circle cx="45" cy="8" r="1.8" fill="#6B4C3B" opacity="0.5"/>
  <circle cx="78" cy="22" r="3" fill="#3E2A1C" opacity="0.4"/>
  <circle cx="25" cy="40" r="2" fill="#6B4C3B" opacity="0.5"/>
  <circle cx="60" cy="45" r="2.8" fill="#3E2A1C" opacity="0.6"/>
  <circle cx="90" cy="50" r="1.5" fill="#7A5D4B" opacity="0.4"/>
  <circle cx="15" cy="65" r="2.2" fill="#3E2A1C" opacity="0.5"/>
  <circle cx="50" cy="70" r="3" fill="#6B4C3B" opacity="0.4"/>
  <circle cx="82" cy="75" r="2" fill="#3E2A1C" opacity="0.6"/>
  <circle cx="35" cy="88" r="1.8" fill="#7A5D4B" opacity="0.5"/>
  <circle cx="68" cy="92" r="2.5" fill="#3E2A1C" opacity="0.4"/>
  <!-- Small pebbles -->
  <ellipse cx="20" cy="28" rx="3.5" ry="2" fill="#8B7355" opacity="0.3"/>
  <ellipse cx="72" cy="58" rx="4" ry="2.5" fill="#8B7355" opacity="0.25"/>
  <ellipse cx="40" cy="55" rx="3" ry="1.8" fill="#9C8B75" opacity="0.2"/>
  <ellipse cx="88" cy="35" rx="3" ry="2" fill="#8B7355" opacity="0.3"/>
  <!-- Subtle grain overlay -->
  <rect x="5" y="5" width="1" height="1" fill="#2E1A0E" opacity="0.3"/>
  <rect x="30" y="20" width="1" height="1" fill="#2E1A0E" opacity="0.2"/>
  <rect x="55" y="35" width="1" height="1" fill="#2E1A0E" opacity="0.3"/>
  <rect x="75" y="10" width="1" height="1" fill="#2E1A0E" opacity="0.2"/>
  <rect x="15" cy="80" width="1" height="1" fill="#2E1A0E" opacity="0.3"/>
  <rect x="92" y="85" width="1" height="1" fill="#2E1A0E" opacity="0.2"/>
</svg>
