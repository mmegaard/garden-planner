<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Marigold flower -->
  <!-- Outer petals -->
  <g id="outer-petals">
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff6f00" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff8f00" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff6f00" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff8f00" transform="rotate(135 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff6f00" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff8f00" transform="rotate(225 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff6f00" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="35" rx="6" ry="12" fill="#ff8f00" transform="rotate(315 50 50)"/>
  </g>
  
  <!-- Inner petals -->
  <g id="inner-petals">
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffb300" transform="rotate(22 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffa000" transform="rotate(67 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffb300" transform="rotate(112 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffa000" transform="rotate(157 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffb300" transform="rotate(202 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffa000" transform="rotate(247 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffb300" transform="rotate(292 50 50)"/>
    <ellipse cx="50" cy="40" rx="4" ry="8" fill="#ffa000" transform="rotate(337 50 50)"/>
  </g>
  
  <!-- Center -->
  <circle cx="50" cy="50" r="8" fill="#f57c00"/>
  <circle cx="50" cy="50" r="6" fill="#e65100"/>
  
  <!-- Stem -->
  <rect x="48" y="50" width="4" height="35" fill="#558b2f"/>
  
  <!-- Leaves -->
  <ellipse cx="38" cy="65" rx="8" ry="4" fill="#689f38" transform="rotate(-20 38 65)"/>
  <ellipse cx="62" cy="68" rx="8" ry="4" fill="#689f38" transform="rotate(20 62 68)"/>
</svg>